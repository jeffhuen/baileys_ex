name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
            native/**/target
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.lock') }}-${{ hashFiles('native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-${{ hashFiles('mix.lock') }}-
            ${{ runner.os }}-beam-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run Credo
        run: mix credo --all

      - name: Run tests
        run: mix test --exclude parity

      - name: Build docs
        env:
          MIX_ENV: dev
        run: mix docs

      - name: Run Dialyzer
        env:
          MIX_ENV: dev
        run: mix dialyzer

      - name: Build Hex package
        env:
          MIX_ENV: dev
        run: mix hex.build
