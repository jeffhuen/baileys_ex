name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: native/**/target
          key: ${{ runner.os }}-rust-${{ hashFiles('native/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plts-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-plts-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run Credo
        run: mix credo --all

      - name: Run tests
        run: mix test --exclude parity

      - name: Build docs
        env:
          MIX_ENV: dev
        run: mix docs

      - name: Run Dialyzer
        env:
          MIX_ENV: dev
        run: mix dialyzer

      - name: Build Hex package
        env:
          MIX_ENV: dev
        run: mix hex.build
