name: Internal Parity

on:
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dev/reference/Baileys-master/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install pinned Baileys reference dependencies
        working-directory: dev/reference/Baileys-master
        run: npm ci

      - name: Regenerate internal parity fixtures
        run: bash dev/scripts/regenerate_parity_fixtures.sh

      - name: Run internal parity suite
        run: bash dev/scripts/run_parity_suite.sh
